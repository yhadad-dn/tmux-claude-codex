# tmux-claude-codex — tmux configuration
# Pairs with the `work` 4-pane builder. Copy to ~/.tmux.conf.

set -g mouse on                                # click to focus + scroll wheel
set -g history-limit 50000                     # 50k scrollback per pane
set -g status off                              # hide bottom status bar

# Per-pane border with title at top, blue border on active pane
set -g pane-border-status top
set -g pane-border-format ' #{pane_title} '
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour33

# Reload conf with prefix + r
bind r source-file ~/.tmux.conf \; display 'tmux conf reloaded'

set -g default-terminal 'screen-256color'
set -sg escape-time 0                          # snappy escape
